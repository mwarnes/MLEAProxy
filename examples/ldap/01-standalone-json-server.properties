# ================================================================
# LDAP Example 1: Standalone JSON LDAP Server
# ================================================================
# Description: Simple LDAP server using JSON user data
# No backend LDAP server required - perfect for testing
#
# Usage:
#   Option 1: Copy this file to the root directory as mleaproxy.properties
#             Run: java -jar mleaproxy.jar
#   Option 2: Use as override file
#             Run: java -Dmleaproxy.properties=./examples/ldap/01-standalone-json-server.properties -jar mleaproxy.jar
#   Option 3: Override specific properties via command line
#             Run: java -jar mleaproxy.jar --mleaproxy.ldap-listeners.ldapjson.port=30389
#   Test: ldapsearch -H ldap://localhost:20389 \
#         -D "cn=manager,ou=users,dc=marklogic,dc=local" \
#         -w password -b "ou=users,dc=marklogic,dc=local" \
#         "(sAMAccountName=admin)"
# ================================================================

# Enable LDAP debug logging
mleaproxy.ldap-debug=true

# ================================================================
# LDAP Listeners
# ================================================================
# ----------------------------------------------------------------
# LDAP Listener: ldapjson
# ----------------------------------------------------------------
mleaproxy.ldap-listeners.ldapjson.ip-address=0.0.0.0
mleaproxy.ldap-listeners.ldapjson.port=20389
mleaproxy.ldap-listeners.ldapjson.debug-level=DEBUG
mleaproxy.ldap-listeners.ldapjson.ldap-mode=internal
mleaproxy.ldap-listeners.ldapjson.ldap-sets=internal
mleaproxy.ldap-listeners.ldapjson.request-processor=jsonauthenticator
mleaproxy.ldap-listeners.ldapjson.description=Simple LDAP Server using JSON user store

# ================================================================
# Server Sets (Required even for INTERNAL mode)
# ================================================================
mleaproxy.ldap-sets.internal.servers=localhost
mleaproxy.ldap-sets.internal.secure=false

# ================================================================
# LDAP Servers (Required reference for server set)
# ================================================================
mleaproxy.ldap-servers.localhost.host=localhost
mleaproxy.ldap-servers.localhost.port=389

# ================================================================
# Request Processors
# ================================================================
mleaproxy.request-processors.jsonauthenticator.auth-class=com.marklogic.processors.JsonRequestProcessor
mleaproxy.request-processors.jsonauthenticator.debug-level=DEBUG
# Optional: Specify custom path to users.json
# mleaproxy.request-processors.jsonauthenticator.parm1=/path/to/users.json
