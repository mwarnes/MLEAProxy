# ================================================================
# LDAP Example 2: Simple LDAP Proxy
# ================================================================
# Description: Forward LDAP requests to a backend LDAP server
# Provides detailed logging for debugging authentication issues
#
# Usage:
#   1. Update mleaproxy.ldap-servers.server1.host and port below
#   2. Copy this file to the root directory as mleaproxy.properties
#   3. Run: java -jar mleaproxy.jar
#   4. Override via CLI: java -jar mleaproxy.jar --mleaproxy.ldap-servers.server1.host=ldap.example.com
#   5. Test: ldapsearch -H ldap://localhost:20389 \
#            -D "cn=admin,dc=example,dc=com" \
#            -w password -b "dc=example,dc=com" \
#            "(uid=user1)"
# ================================================================

# Enable LDAP debug logging
mleaproxy.ldap-debug=true

# ================================================================
# LDAP Listeners
# ================================================================
# ----------------------------------------------------------------
# LDAP Listener: proxy
# ----------------------------------------------------------------
mleaproxy.ldap-listeners.proxy.ip-address=0.0.0.0
mleaproxy.ldap-listeners.proxy.port=20389
mleaproxy.ldap-listeners.proxy.debug-level=DEBUG
mleaproxy.ldap-listeners.proxy.ldap-sets=set1
mleaproxy.ldap-listeners.proxy.ldap-mode=single
mleaproxy.ldap-listeners.proxy.request-processor=ldapproxy
mleaproxy.ldap-listeners.proxy.description=LDAP Proxy server

# ================================================================
# Request Processors
# ================================================================
mleaproxy.request-processors.ldapproxy.auth-class=com.marklogic.processors.ProxyRequestProcessor
mleaproxy.request-processors.ldapproxy.debug-level=DEBUG

# Optional: Map LDAP attributes (useful for MarkLogic 8 compatibility)
# Map memberOf (MarkLogic) to isMemberOf (backend LDAP)
# mleaproxy.request-processors.ldapproxy.params[0]=memberOf:isMemberOf

# ================================================================
# LDAP Server Sets
# ================================================================
mleaproxy.ldap-sets.set1.servers=server1

# ================================================================
# LDAP Servers
# ================================================================
# Backend LDAP/AD server configuration
mleaproxy.ldap-servers.server1.host=kerberos.marklogic.local
mleaproxy.ldap-servers.server1.port=10389
