# ================================================================
# LDAP Example 4: Fully Secure LDAP Proxy (LDAPS Both Sides)
# ================================================================
# Description: LDAPS on both client and backend connections
# Complete end-to-end encryption for maximum security
#
# Prerequisites:
#   - Backend LDAP server must support LDAPS (port 636)
#   - Keystore with server certificate for client-facing LDAPS
#   - Optional: Truststore with CA certificate for backend validation
#
# Certificate Generation:
#   keytool -genkeypair -alias mleaproxy -keyalg RSA -keysize 2048 \
#           -validity 365 -keystore mlproxy.jks -storepass password \
#           -dname "CN=localhost,OU=IT,O=Company,L=City,ST=State,C=US"
#
# Usage:
#   1. Generate or obtain server certificate (see above)
#   2. Update paths and passwords below
#   3. Copy this file to the root directory as mleaproxy.properties
#   4. Run: java -jar mleaproxy.jar
#   5. Override via CLI: java -jar mleaproxy.jar --mleaproxy.ldap-listeners.proxy.keystore=/new/path.jks
#   6. Test: ldapsearch -H ldaps://localhost:30636 \
#            -D "cn=admin,dc=example,dc=com" \
#            -w password -b "dc=example,dc=com" \
#            "(uid=user1)"
# ================================================================

# Enable LDAP debug logging
mleaproxy.ldap-debug=true

# ================================================================
# LDAP Listeners
# ================================================================
# ----------------------------------------------------------------
# LDAP Listener: proxy (LDAPS)
# ----------------------------------------------------------------
mleaproxy.ldap-listeners.proxy.ip-address=0.0.0.0
mleaproxy.ldap-listeners.proxy.port=30636
mleaproxy.ldap-listeners.proxy.debug-level=DEBUG
mleaproxy.ldap-listeners.proxy.secure=true
mleaproxy.ldap-listeners.proxy.keystore=/Users/mwarnes/mlproxy.jks
mleaproxy.ldap-listeners.proxy.keystore-password=password
mleaproxy.ldap-listeners.proxy.ldap-sets=set1
mleaproxy.ldap-listeners.proxy.ldap-mode=single
mleaproxy.ldap-listeners.proxy.request-processor=ldapproxy
mleaproxy.ldap-listeners.proxy.description=Fully secure LDAP proxy (LDAPS both sides)

# ================================================================
# Request Processors
# ================================================================
mleaproxy.request-processors.ldapproxy.auth-class=com.marklogic.processors.ProxyRequestProcessor
mleaproxy.request-processors.ldapproxy.debug-level=DEBUG

# ================================================================
# LDAP Server Sets
# ================================================================
mleaproxy.ldap-sets.set1.servers=server1
mleaproxy.ldap-sets.set1.secure=true

# Optional: Add truststore for backend CA certificate validation
# mleaproxy.ldap-sets.set1.truststore=/path/to/truststore.jks
# mleaproxy.ldap-sets.set1.truststore-password=password

# ================================================================
# LDAP Servers
# ================================================================
# Backend LDAPS server configuration
mleaproxy.ldap-servers.server1.host=kerberos.marklogic.local
mleaproxy.ldap-servers.server1.port=636
