# ================================================================
# LDAP Example 5: Load Balancing (Round Robin)
# ================================================================
# Description: Balance requests across multiple LDAP servers
# Distributes load evenly using round-robin algorithm
#
# Load Balancing Modes:
#   - single        : Only first server used (development/testing)
#   - failover      : Primary server with backup (high availability)
#   - roundrobin    : Distribute evenly (balanced load distribution)
#   - roundrobindns : DNS-based round robin (cloud/dynamic environments)
#   - fewest        : Least connections (variable request sizes)
#   - fastest       : Fastest response time (heterogeneous servers)
#
# Usage:
#   1. Update server hosts and ports below
#   2. Choose load balancing mode (roundrobin recommended)
#   3. Copy this file to the root directory as mleaproxy.properties
#   4. Run: java -jar mleaproxy.jar
#   5. Override via CLI: java -jar mleaproxy.jar --mleaproxy.ldap-listeners.proxy.ldap-mode=failover
#   6. Test: ldapsearch -H ldap://localhost:30389 \
#            -D "cn=admin,dc=example,dc=com" \
#            -w password -b "dc=example,dc=com" \
#            "(uid=user1)"
# ================================================================

# Enable LDAP debug logging
mleaproxy.ldap-debug=true

# ================================================================
# LDAP Listeners
# ================================================================
# ----------------------------------------------------------------
# LDAP Listener: proxy
# ----------------------------------------------------------------
mleaproxy.ldap-listeners.proxy.ip-address=0.0.0.0
mleaproxy.ldap-listeners.proxy.port=30389
mleaproxy.ldap-listeners.proxy.debug-level=DEBUG
mleaproxy.ldap-listeners.proxy.ldap-sets=set1
mleaproxy.ldap-listeners.proxy.ldap-mode=roundrobin
mleaproxy.ldap-listeners.proxy.request-processor=ldapproxy
mleaproxy.ldap-listeners.proxy.description=Load balancing LDAP proxy

# ================================================================
# Request Processors
# ================================================================
mleaproxy.request-processors.ldapproxy.auth-class=com.marklogic.processors.ProxyRequestProcessor
mleaproxy.request-processors.ldapproxy.debug-level=DEBUG

# ================================================================
# LDAP Server Sets
# ================================================================
mleaproxy.ldap-sets.set1.servers=server1,server2,server3

# ================================================================
# LDAP Servers
# ================================================================
# Backend LDAP server 1
mleaproxy.ldap-servers.server1.host=192.168.0.50
mleaproxy.ldap-servers.server1.port=10389

# Backend LDAP server 2
mleaproxy.ldap-servers.server2.host=192.168.0.51
mleaproxy.ldap-servers.server2.port=10389

# Backend LDAP server 3
mleaproxy.ldap-servers.server3.host=192.168.0.52
mleaproxy.ldap-servers.server3.port=10389
