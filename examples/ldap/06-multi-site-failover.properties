# ================================================================
# LDAP Example 6: Multi-Site Failover
# ================================================================
# Description: Load balance within sites, with failover between sites
# Provides both load distribution and geographic redundancy
#
# Architecture:
#   - Primary Site: server1, server2 (load balanced)
#   - Secondary Site: server3, server4 (load balanced)
#   - Automatic failover if primary site is unavailable
#
# Usage:
#   1. Update server hosts and ports for both sites
#   2. Configure server sets (set1 = primary, set2 = secondary)
#   3. Copy this file to the root directory as mleaproxy.properties
#   4. Run: java -jar mleaproxy.jar
#   5. Override via CLI: java -jar mleaproxy.jar --mleaproxy.ldap-debug=false
#   6. Test: ldapsearch -H ldap://localhost:30389 \
#            -D "cn=admin,dc=example,dc=com" \
#            -w password -b "dc=example,dc=com" \
#            "(uid=user1)"
# ================================================================

# Enable LDAP debug logging
mleaproxy.ldap-debug=true

# ================================================================
# LDAP Listeners
# ================================================================
# ----------------------------------------------------------------
# LDAP Listener: proxy
# ----------------------------------------------------------------
mleaproxy.ldap-listeners.proxy.ip-address=0.0.0.0
mleaproxy.ldap-listeners.proxy.port=30389
mleaproxy.ldap-listeners.proxy.debug-level=DEBUG
mleaproxy.ldap-listeners.proxy.ldap-sets=set1,set2
mleaproxy.ldap-listeners.proxy.ldap-mode=roundrobin
mleaproxy.ldap-listeners.proxy.request-processor=ldapproxy
mleaproxy.ldap-listeners.proxy.description=Multi-site load balancing with failover

# ================================================================
# Request Processors
# ================================================================
mleaproxy.request-processors.ldapproxy.auth-class=com.marklogic.processors.ProxyRequestProcessor
mleaproxy.request-processors.ldapproxy.debug-level=DEBUG

# ================================================================
# LDAP Server Sets
# ================================================================
# Primary Site - Server Set 1
mleaproxy.ldap-sets.set1.servers=server1,server2

# Secondary Site - Server Set 2
mleaproxy.ldap-sets.set2.servers=server3,server4

# ================================================================
# LDAP Servers - Primary Site
# ================================================================
# Primary Site - LDAP server 1
mleaproxy.ldap-servers.server1.host=192.168.0.50
mleaproxy.ldap-servers.server1.port=10389

# Primary Site - LDAP server 2
mleaproxy.ldap-servers.server2.host=192.168.0.51
mleaproxy.ldap-servers.server2.port=10389

# ================================================================
# LDAP Servers - Secondary Site
# ================================================================
# Secondary Site - LDAP server 3
mleaproxy.ldap-servers.server3.host=192.168.0.52
mleaproxy.ldap-servers.server3.port=10389

# Secondary Site - LDAP server 4
mleaproxy.ldap-servers.server4.host=192.168.0.53
mleaproxy.ldap-servers.server4.port=10389
