# ================================================================
# SAML Configuration
# ================================================================

# Enable SAML debug logging
mleaproxy.saml-debug=true

# SAML certificate and key paths (optional - uses default if not specified)
# Uncomment and configure if using custom certificates
#mleaproxy.saml-ca-path=/path/to/certificate.pem
#mleaproxy.saml-key-path=/path/to/rsakey.pem

# SAML response validity duration in seconds (default: 300 = 5 minutes)
#mleaproxy.saml-response-validity=300

# Default roles to assign when user is not found in users.json
# and no roles are specified in the request
# Use comma-separated list of roles
mleaproxy.saml-default-roles=user

# ================================================================
# SAML Listeners
# ================================================================
# Comma-separated list of SAML listeners to start
# Uncomment to enable SAML authentication endpoints
#mleaproxy.saml-listeners=auth1

# ----------------------------------------------------------------
# SAML Listener: auth1
# ----------------------------------------------------------------
mleaproxy.saml-listener.auth1.ip-address=0.0.0.0
mleaproxy.saml-listener.auth1.port=9080
mleaproxy.saml-listener.auth1.debug-level=DEBUG
#mleaproxy.saml-listener.auth1.ca-path=/path/to/certificate.pem
#mleaproxy.saml-listener.auth1.key-path=/path/to/rsakey.pem
mleaproxy.saml-listener.auth1.description=SAML authentication endpoint
